<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-label="LLM lifecycle">
  <rect width="1100" height="360" fill="#ffffff"/>
  <style>
    .box { fill: #f7f7f7; stroke: #202020; stroke-width: 2; rx: 10; }
    .title { font: 700 22px Arial, sans-serif; fill: #111111; }
    .text { font: 15px Arial, sans-serif; fill: #333333; }
    .arrow { stroke: #222222; stroke-width: 2.4; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222222"/>
    </marker>
  </defs>
  <text x="40" y="42" class="title">LLM Project Lifecycle</text>
  <g transform="translate(40,80)">
    <rect class="box" width="150" height="110"/>
    <text x="20" y="36" class="title">Model</text>
    <text x="20" y="66" class="text">Hugging Face</text>
    <text x="20" y="88" class="text">config + weights</text>
  </g>
  <line x1="205" y1="135" x2="270" y2="135" class="arrow"/>
  <g transform="translate(280,80)">
    <rect class="box" width="150" height="110"/>
    <text x="20" y="36" class="title">Data</text>
    <text x="20" y="66" class="text">SFT corpus</text>
    <text x="20" y="88" class="text">eval set</text>
  </g>
  <line x1="445" y1="135" x2="510" y2="135" class="arrow"/>
  <g transform="translate(520,80)">
    <rect class="box" width="160" height="110"/>
    <text x="20" y="36" class="title">Train</text>
    <text x="20" y="66" class="text">LoRA / QLoRA</text>
    <text x="20" y="88" class="text">DPO / RLHF</text>
  </g>
  <line x1="695" y1="135" x2="760" y2="135" class="arrow"/>
  <g transform="translate(770,80)">
    <rect class="box" width="150" height="110"/>
    <text x="20" y="36" class="title">Optimize</text>
    <text x="20" y="66" class="text">quantization</text>
    <text x="20" y="88" class="text">KV cache</text>
  </g>
  <line x1="935" y1="135" x2="1000" y2="135" class="arrow"/>
  <g transform="translate(40,230)">
    <rect class="box" width="1020" height="78"/>
    <text x="22" y="32" class="title">Deploy and Iterate</text>
    <text x="22" y="58" class="text">vLLM / TGI / TensorRT-LLM / CANN / AscendCL -> monitoring -> data feedback -> next iteration</text>
  </g>
</svg>

