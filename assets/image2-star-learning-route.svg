<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780"><rect width="1400" height="780" fill="#fbfbfb"/><text x="700" y="70" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="40" font-weight="700" fill="#111827">8-Week Star-Driven Learning Route</text><text x="700" y="108" text-anchor="middle" font-family="Inter,Segoe UI,Arial" font-size="18" fill="#475569">turn repos into deliverables: notes, labs, benchmarks, diagrams, and PR targets</text><g font-family="Inter,Segoe UI,Arial"><line x1="110" y1="250" x2="1290" y2="250" stroke="#94a3b8" stroke-width="6"/><circle cx="130" cy="250" r="24" fill="#2563eb"/><text x="130" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">0</text><text x="130" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Input Hygiene</text><circle cx="290" cy="250" r="24" fill="#7c3aed"/><text x="290" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text><text x="290" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Agent Runtime</text><circle cx="450" cy="250" r="24" fill="#9333ea"/><text x="450" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text><text x="450" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Coding Harness</text><circle cx="610" cy="250" r="24" fill="#16a34a"/><text x="610" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text><text x="610" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">RAG Apps</text><circle cx="770" cy="250" r="24" fill="#f97316"/><text x="770" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">4</text><text x="770" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">CUDA/ZLUDA</text><circle cx="930" cy="250" r="24" fill="#0f766e"/><text x="930" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">5</text><text x="930" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Optimization</text><circle cx="1090" cy="250" r="24" fill="#0284c7"/><text x="1090" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">6</text><text x="1090" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Research Tools</text><circle cx="1250" cy="250" r="24" fill="#dc2626"/><text x="1250" y="255" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">7</text><text x="1250" y="315" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Safety Boundary</text><rect x="70" y="385" width="1260" height="250" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/><text x="115" y="430" font-size="22" font-weight="700" fill="#111827">Deliverable ladder</text><text x="115" y="475" font-size="18" fill="#334155">0. Convert documents -> Markdown / JSON and record failure cases.</text><text x="115" y="510" font-size="18" fill="#334155">1. Read agent runtime as state machine + tool boundary, not as magic.</text><text x="115" y="545" font-size="18" fill="#334155">2. Build one RAG / memory / document QA baseline with fixed evaluation samples.</text><text x="115" y="580" font-size="18" fill="#334155">3. Read one CUDA or scientific-computing kernel and explain memory access.</text><text x="115" y="615" font-size="18" fill="#334155">4. Turn the best notes into source-reading docs and small PR candidates.</text></g></svg>